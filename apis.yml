apis:
- name: Memorystore for Redis API
  description: >-
    The Memorystore for Redis API enables programmatic management of fully managed
    Redis instances on Google Cloud. It supports creating, updating, deleting, and
    scaling Redis instances, configuring high availability with automatic failover,
    managing data persistence, and performing version upgrades. The API provides
    operations for both basic single-node and standard high-availability
    configurations.
  image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
