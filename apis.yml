name: Google Cloud Memorystore
description: >-
  Google Cloud Memorystore is a fully managed in-memory data store service for
  Redis and Memcached. It provides a scalable, secure, and highly available
  caching layer that helps accelerate application performance. Memorystore
  automates complex tasks like provisioning, replication, failover, and patching,
  enabling developers to focus on building applications without managing
  infrastructure.
