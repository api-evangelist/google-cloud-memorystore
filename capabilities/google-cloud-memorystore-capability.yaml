    - name: createinstance
      description: Google Cloud Memorystore Create an instance
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: google-cloud-memorystore.createinstance
      with:
        project: tools.project
        location: tools.location
        instanceId: tools.instanceId
      inputParameters:
      - name: project
        type: string
        description: project
